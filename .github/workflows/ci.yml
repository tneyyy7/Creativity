name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fails the build on ESLint errors (e.g. the no-undef crashes found in the audit).
      # Warnings are allowed for now (~22 exhaustive-deps); tighten to --max-warnings 0
      # once those are resolved.
      - name: Lint
        run: npx eslint . --ext js,jsx

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # RLS regression guard — asserts the DB security invariants fixed on 2026-06-10
  # (self-grant Pro, self-grant admin, billing PII leak) stay closed. Read-only.
  # Needs the SUPABASE_ACCESS_TOKEN repo secret; skips (passes) if it is absent
  # so forked-PR builds don't fail spuriously.
  rls-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run RLS guard
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: mutrphgzoczcitnmpxsm
        run: node scripts/audit_rls.mjs
